<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Globia Careers Dashboard</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.firebasestorage.app",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

/* ADMIN EMAIL */
const ADMIN_EMAIL = "info@globiaworld.com";

/* LOGIN */
window.login = async () => {
  await signInWithPopup(auth, provider);
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
};

/* AUTH CHECK */
onAuthStateChanged(auth, async (user) => {

  if(!user){
    document.getElementById("loginBox").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    document.body.innerHTML = `
      <h2 style='text-align:center;margin-top:100px;'>
        Access Denied
      </h2>
    `;
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

});

</script>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f6f9;
}

/* LOGIN */
.loginBox{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.loginBtn{
  padding:15px 25px;
  background:#0f9d58;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:30px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logoutBtn{
  padding:10px 15px;
  border:none;
  background:#111;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  max-width:700px;
}

.status{
  color:#0f9d58;
  font-weight:bold;
  margin-top:10px;
}

/* FORM */
form{
  margin-top:30px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
}

.submitBtn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:#0072ff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.note{
  margin-top:15px;
  color:#666;
  font-size:14px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="loginBox">

  <button class="loginBtn" onclick="login()">
    Admin Login with Google
  </button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="header">
    <h2>📊 Globia Careers Dashboard</h2>

    <button class="logoutBtn" onclick="logout()">
      Logout
    </button>
  </div>

  <div class="card">

    <h2>Applications System Active</h2>

    <p>
      All applications are sent directly to:
    </p>

    <p class="status">
      info@globiaworld.com
    </p>

    <hr>

    <h3>Test Application Form</h3>

    <!-- WORKING FORM -->
    <form action="https://formsubmit.co/info@globiaworld.com"
          method="POST"
          enctype="multipart/form-data">

      <input type="text"
             name="Full Name"
             placeholder="Full Name"
             required>

      <input type="email"
             name="Email"
             placeholder="Email Address"
             required>

      <input type="text"
             name="Position"
             placeholder="Position Applying For">

      <textarea name="About"
                placeholder="Tell us about yourself"></textarea>

      <input type="file"
             name="CV"
             required>

      <!-- HIDDEN SETTINGS -->
      <input type="hidden"
             name="_captcha"
             value="false">

      <input type="hidden"
             name="_subject"
             value="New Globia Job Application">

      <input type="hidden"
             name="_template"
             value="table">

      <input type="hidden"
             name="_next"
             value="thankyou.html">

      <button type="submit" class="submitBtn">
        Submit Application
      </button>

    </form>

    <p class="note">
      First submission requires email confirmation from FormSubmit.
    </p>

  </div>

</div>

</body>
</html>
