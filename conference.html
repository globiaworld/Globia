
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Conferences</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

nav { background:#0a1f44; padding:15px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }

.hero {
  height:60vh;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
             url('images/conference1.jpg') center/cover;
  display:flex; justify-content:center; align-items:center;
  color:white;
}

.section { padding:50px 20px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
}

video { width:100%; margin-top:10px; border-radius:10px; }

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
}

.btn {
  background:#ff6600;
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="#">Home</a>
<a href="#">Conferences</a>
</nav>

<section class="hero">
<h1>International Conferences</h1>
</section>

<!-- UPLOAD VIDEO -->
<section class="section">
<h2>Upload Conference Video</h2>

<form id="uploadForm" enctype="multipart/form-data">
<input type="text" id="title" placeholder="Conference Title" required>
<input type="file" id="videoFile" accept="video/*" required>
<button class="btn">Upload Video</button>
</form>

<p id="uploadMsg" style="color:green;"></p>
</section>

<!-- DISPLAY VIDEOS -->
<section class="section">
<h2>Conference Videos</h2>
<div class="grid" id="videoContainer"></div>
</section>

<script>

/* LOAD VIDEOS */
async function loadVideos(){
 const res = await fetch("http://localhost:5000/videos");
 const data = await res.json();

 let container = document.getElementById("videoContainer");
 container.innerHTML = "";

 data.forEach(v => {
  container.innerHTML += `
    <div class="card">
      <h3>${v.title}</h3>
      <video controls src="${v.path}"></video>
    </div>
  `;
 });
}
loadVideos();

/* UPLOAD VIDEO */
document.getElementById("uploadForm").addEventListener("submit", async e=>{
 e.preventDefault();

 let formData = new FormData();
 formData.append("title", document.getElementById("title").value);
 formData.append("video", document.getElementById("videoFile").files[0]);

 await fetch("http://localhost:5000/upload", {
   method: "POST",
   body: formData
 });

 document.getElementById("uploadMsg").innerText = "✅ Video uploaded!";
 document.getElementById("uploadForm").reset();

 loadVideos(); // refresh list
});

</script>

</body>
</html>
