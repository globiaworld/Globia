<!DOCTYPE html>
<html lang="en">

<head>

<link rel="icon" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GlobiaWorld Ecosystem</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.appspot.com",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

/* LOGIN */
window.googleLogin = async () => {

  try {

    await signInWithPopup(auth, provider);

  } catch (e) {

    alert(e.message);

  }

};

/* LOGOUT */
window.logout = async () => {

  await signOut(auth);

  document.body.classList.remove("logged");

  document.getElementById("userBox").style.display = "none";

  document.getElementById("authBtn").style.display = "block";

};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {

  if (user) {

    document.body.classList.add("logged");

    document.getElementById("authBtn").style.display = "none";

    document.getElementById("userBox").style.display = "flex";

    document.getElementById("userEmail").innerText = user.email;

  } else {

    document.body.classList.remove("logged");

    document.getElementById("authBtn").style.display = "block";

    document.getElementById("userBox").style.display = "none";

  }

});

</script>

<style>

/* BODY */
body{
  margin:0;
  font-family:Segoe UI;
  background:white;
  color:#111;
}

/* LOGGED MODE */
body.logged .topbar{
  background:linear-gradient(135deg,#0f9d58,#1db954);
  color:white;
}

/* TOPBAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:65px;
  background:#0a1f44;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:1000;
}

.logo{
  height:42px;
}

/* AUTH */
.auth{
  background:linear-gradient(135deg,#ff6600,#ff2d55);
  padding:10px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

.userBox{
  display:none;
  gap:10px;
  align-items:center;
  color:white;
}

.logoutBtn{
  background:#111;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:url('images/joe.jpg') center/cover;
  color:white;
}

.hero h1{
  font-size:55px;
  margin-bottom:10px;
}

.hero p{
  font-size:22px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:50px;
}

/* CARD */
.card{
  border-radius:18px;
  padding:20px;
  background:#f8f8f8;
  border:1px solid #eee;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

.conference{
  background:#ff6600;
  color:white;
}

.tourism{
  background:#0072ff;
  color:white;
}

.career{
  background:#0f9d58;
  color:white;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:40px;
  background:#111;
  color:white;
}

.contact h2{
  margin-bottom:10px;
}

.contact p{
  margin:0;
}

/* MOBILE */
@media(max-width:768px){

  .hero h1{
    font-size:38px;
  }

  .hero p{
    font-size:18px;
  }

  .grid{
    padding:20px;
  }

}

</style>

</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

  <img src="images/logo.png" class="logo">

  <!-- LOGIN -->
  <div id="authBtn" class="auth" onclick="googleLogin()">
    Sign in with Google
  </div>

  <!-- USER -->
  <div id="userBox" class="userBox">

    <span id="userEmail"></span>

    <button class="logoutBtn" onclick="logout()">
      Logout
    </button>

  </div>

</div>

<!-- HERO -->
<section class="hero">

  <h1>GlobiaWorld Ecosystem 🌍</h1>

  <p>
    Tourism • Conferences • Careers
  </p>

</section>

<!-- GRID -->
<div class="grid">

  <!-- CONFERENCE -->
  <div class="card">

    <h2>🎤 Globia Conferences</h2>

    <button class="btn conference"
            onclick="location.href='conference.html'">

      Explore Events

    </button>

  </div>

  <!-- TOURISM -->
  <div class="card">

    <h2>✈️ Globia Tourism</h2>

    <button class="btn tourism"
            onclick="location.href='tourism.html'">

      Discover Travel

    </button>

  </div>

  <!-- CAREERS -->
  <div class="card">

    <h2>💼 Careers at Globia</h2>

    <button class="btn career"
            onclick="location.href='career.html'">

      Apply Now

    </button>

  </div>

</div>

<!-- CONTACT -->
<div class="contact">

  <h2>Contact Us</h2>

  <p>
    info@globiaworld.com
  </p>

</div>

</body>

</html>
