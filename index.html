<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/png" href="./images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld | Global Platform</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  GoogleAuthProvider,
  signInWithPopup,
  setPersistence,
  browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.firebasestorage.app",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ FIX: apply persistence safely
setPersistence(auth, browserSessionPersistence).catch(console.error);

// ================= FUNCTIONS =================

window.openModal = function(){
  document.getElementById("authModal").style.display = "flex";
};

window.closeModal = function(){
  document.getElementById("authModal").style.display = "none";
};

function showStatus(msg){
  document.getElementById("status").innerText = msg;
}

// SIGNUP
window.signup = async function(){
  const email = document.getElementById("emailInput").value;
  const password = document.getElementById("passwordInput").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    showStatus("✅ Account created");
    closeModal();
  } catch (err) {
    showStatus(err.message);
  }
};

// LOGIN
window.login = async function(){
  const email = document.getElementById("emailInput").value;
  const password = document.getElementById("passwordInput").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    showStatus("✅ Logged in");
    closeModal();
  } catch (err) {
    showStatus(err.message);
  }
};

// GOOGLE LOGIN
window.googleLogin = async function(){
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
    showStatus("✅ Google login successful");
    closeModal();
  } catch (err) {
    showStatus(err.message);
  }
};

// LOGOUT
window.logout = async function(){
  await signOut(auth);

  // UI reset
  document.getElementById("userBar").style.display = "none";
  document.getElementById("loginTab").style.display = "block";
  document.getElementById("userBar").innerHTML = "";
};

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  const userBar = document.getElementById("userBar");
  const loginTab = document.getElementById("loginTab");

  if(user){
    userBar.style.display = "flex";
    loginTab.style.display = "none";

    userBar.innerHTML = `
      👤 ${user.email}
      <button onclick="logout()">Logout</button>
    `;
  } else {
    userBar.style.display = "none";
    loginTab.style.display = "block";
  }
});

</script>

<style>
body { margin:0; font-family:Arial; }

/* USER BAR */
.user-bar {
  display:none;
  justify-content:center;
  align-items:center;
  background:#0a1f44;
  color:white;
  padding:6px;
}

.user-bar button {
  margin-left:10px;
  background:#ff6600;
  border:none;
  color:white;
  padding:5px 10px;
  cursor:pointer;
}

/* NAV */
nav {
  background:#0a1f44;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { max-height:40px; }

.nav-right {
  display:flex;
  align-items:center;
}

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

.login-tab {
  background:#ff6600;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
             url('./images/joe.jpg') center/cover;
}

.btn {
  padding:12px 20px;
  margin:10px;
  background:#ff6600;
  color:white;
  border:none;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:25px;
  border-radius:10px;
  width:90%;
  max-width:350px;
  text-align:center;
}

.modal-content input {
  width:90%;
  padding:10px;
  margin:10px 0;
}

.modal-content button {
  width:90%;
  padding:10px;
  margin:5px;
  background:#0a1f44;
  color:white;
  border:none;
}

.google-btn { background:#db4437; }

/* MOBILE */
@media(max-width:600px){
  nav { flex-direction:column; }
}
</style>
</head>

<body>

<div id="userBar" class="user-bar"></div>

<nav>
  <img src="./images/logo.png" class="logo">

  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>

    <div id="loginTab" class="login-tab" onclick="openModal()">
      Login / Sign Up
    </div>
  </div>
</nav>

<section class="hero">
  <h1>Global Services Platform</h1>
  <p>Connecting Tourism & Conferences</p>

  <a href="conference.html"><button class="btn">Explore Conferences</button></a>
  <a href="tourism.html"><button class="btn">Explore Tourism</button></a>
</section>

<div id="authModal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" style="float:right;cursor:pointer;">&times;</span>

    <h3>Account Access</h3>

    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>

    <button class="google-btn" onclick="googleLogin()">Google Login</button>

    <p id="status"></p>
  </div>
</div>

</body>
</html>
