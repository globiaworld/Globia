
<!DOCTYPE html>
<html lang="en">
<head>

<!-- ICON -->
<link rel="icon" type="image/png" sizes="50x50" href="./images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld | Global Platform</title>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "globia-7038f.firebaseapp.com",
    projectId: "globia-7038f",
    storageBucket: "globia-7038f.firebasestorage.app",
    messagingSenderId: "323603007481",
    appId: "1:323603007481:web:ed058146cae31922dd9f28"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // SIGN UP
  window.signup = function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        document.getElementById("userStatus").innerText = "✅ Account created successfully";
      })
      .catch(err => {
        document.getElementById("userStatus").innerText = err.message;
      });
  }

  // LOGIN
  window.login = function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        document.getElementById("userStatus").innerText = "✅ Login successful";
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);
      })
      .catch(err => {
        document.getElementById("userStatus").innerText = err.message;
      });
  }

  // LOGOUT
  window.logout = function(){
    signOut(auth).then(() => {
      document.getElementById("userStatus").innerText = "Logged out";
    });
  }

  // AUTH STATE
  onAuthStateChanged(auth, (user) => {
    const status = document.getElementById("userStatus");
    const authBox = document.querySelector(".auth-box");

    if(user){
      status.innerText = "Logged in as: " + user.email;
      authBox.style.display = "none";
    } else {
      status.innerText = "Not logged in";
      authBox.style.display = "block";
    }
  });
</script>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
}

/* NAVBAR */
nav {
  background:#0a1f44;
  padding:5px 20px;
  height:60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGO */
.nav-left {
  display:flex;
  align-items:center;
}

.logo {
  max-height:45px;
  width:auto;
  object-fit:contain;
}

/* NAV LINKS */
nav a {
  color:white;
  margin:0 12px;
  text-decoration:none;
  font-weight:bold;
  font-size:15px;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;

  background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
             url('./images/joe.jpg') center/cover;
}

.hero h1 {
  font-size:48px;
  font-weight:bold;
}

.hero p {
  font-size:18px;
  margin-bottom:20px;
}

/* BUTTON */
.btn {
  padding:12px 25px;
  margin:10px;
  background:#ff6600;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
  transition:0.3s;
}

.btn:hover {
  background:#e65c00;
  transform:scale(1.05);
}

/* AUTH BOX */
.auth-box {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
  color:black;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.auth-box input {
  display:block;
  margin:10px auto;
  padding:10px;
  width:220px;
  border:1px solid #ccc;
  border-radius:5px;
}

.auth-box button {
  margin:5px;
  padding:10px 15px;
  border:none;
  background:#0a1f44;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.auth-box button:hover {
  background:#132c63;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-left">
    <img src="./images/logo.png" class="logo" alt="GlobiaWorld Logo">
  </div>

  <div>
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Global Services Platform</h1>
  <p>Connecting Tourism & Conferences</p>

  <a href="conference.html"><button class="btn">Explore Conferences</button></a>
  <a href="tourism.html"><button class="btn">Explore Tourism</button></a>

  <!-- AUTH -->
  <div class="auth-box">
    <h3>Account Access</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>

    <p id="userStatus">Not logged in</p>
  </div>
</section>

</body>
</html>
