<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="images/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld Ecosystem</title>

<!-- FIREBASE COMPAT (IMPORTANT FIX) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

/* LIGHT PREMIUM BACKGROUND FIX */
body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f7fb;
  color:#111;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:65px;
  background:#0a1f44;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:1000;
}

.logo{height:42px}

/* LOGIN BUTTON */
.auth{
  background:linear-gradient(135deg,#ff6600,#ff2d55);
  color:white;
  padding:10px 18px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
  url("images/joe.jpg") center/cover;
  color:white;
}

.hero h1{font-size:42px}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:50px;
}

/* CARDS */
.card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* BUTTONS */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

.legal{background:#0a1f44;color:white}
.dating{background:#ff2d55;color:white}
.conference{background:#ff7a18;color:white}
.tourism{background:#0072ff;color:white}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
}

</style>

</head>

<body>

<!-- FIREBASE INIT (FIXED LOGIN WORKING) -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

/* OPEN MODAL */
function openAuth(){
  document.getElementById("modal").style.display="flex";
}

/* CLOSE MODAL */
function closeAuth(){
  document.getElementById("modal").style.display="none";
}

/* EMAIL LOGIN */
function login(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,pass)
  .then(()=>closeAuth())
  .catch(e=>alert(e.message));
}

/* SIGNUP */
function signup(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email,pass)
  .then(()=>closeAuth())
  .catch(e=>alert(e.message));
}

/* GOOGLE LOGIN */
function googleLogin(){
  auth.signInWithPopup(provider)
  .then(()=>closeAuth())
  .catch(e=>alert(e.message));
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
  const btn=document.getElementById("authBtn");
  if(user){
    btn.innerText="Logged in: "+user.email;
  }else{
    btn.innerText="Login / Register";
  }
});
</script>

<!-- TOP BAR -->
<div class="topbar">

  <img src="images/logo.png" class="logo">

  <div class="auth" id="authBtn" onclick="openAuth()">
    Login / Register
  </div>

</div>

<!-- HERO -->
<section class="hero">
  <h1>GlobiaWorld Ecosystem 🌍</h1>
  <p>One platform. Four global services.</p>
</section>

<!-- PLATFORM -->
<div class="grid">

  <div class="card">
    <h2>⚖️ Globia Legal</h2>
    <button class="btn legal" onclick="location.href='justice.html'">Find Lawyers</button>
  </div>

  <div class="card">
    <h2>💘 Globia Dating</h2>
    <button class="btn dating" onclick="location.href='dating.html'">Start Dating</button>
  </div>

  <div class="card">
    <h2>🎤 Conferences</h2>
    <button class="btn conference" onclick="location.href='conference.html'">Explore Events</button>
  </div>

  <div class="card">
    <h2>✈️ Tourism</h2>
    <button class="btn tourism" onclick="location.href='tourism.html'">Travel Now</button>
  </div>

</div>

<!-- CONTACT -->
<div style="text-align:center;padding:40px;">
  <h2>Contact Us</h2>
  <p>globiaworld@gmail.com</p>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Login</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <button onclick="googleLogin()">Google Login</button>

    <br><br>
    <button onclick="closeAuth()">Close</button>

  </div>
</div>

</body>
</html>
