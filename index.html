
<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/png" sizes="50x50" href="./images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld | Global Platform</title>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  GoogleAuthProvider,
  signInWithPopup,
  setPersistence,
  browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.firebasestorage.app",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ IMPORTANT FIX: session only (no auto login across devices)
setPersistence(auth, browserSessionPersistence);

// SIGNUP
window.signup = () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => showStatus("✅ Account created"))
    .catch(err => showStatus(err.message));
};

// LOGIN
window.login = () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      showStatus("✅ Login successful");
      closeModal();
    })
    .catch(err => showStatus(err.message));
};

// GOOGLE LOGIN
window.googleLogin = () => {
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider)
    .then(() => {
      showStatus("✅ Google login successful");
      closeModal();
    })
    .catch(err => showStatus(err.message));
};

// LOGOUT (FIXED)
window.logout = () => {
  signOut(auth).then(() => {
    document.getElementById("userBar").style.display = "none";
    document.getElementById("loginTab").style.display = "block";
  });
};

// AUTH STATE (FIXED PROPERLY)
onAuthStateChanged(auth, (user) => {
  const bar = document.getElementById("userBar");
  const loginBtn = document.getElementById("loginTab");

  if(user){
    bar.style.display = "flex";
    bar.innerHTML = `
      👤 ${user.email}
      <button onclick="logout()">Logout</button>
    `;
    loginBtn.style.display = "none";
  } else {
    bar.style.display = "none";
    loginBtn.style.display = "block";
  }
});

// UI
window.openModal = () => document.getElementById("authModal").style.display = "flex";
window.closeModal = () => document.getElementById("authModal").style.display = "none";
window.showStatus = (msg) => document.getElementById("status").innerText = msg;

</script>

<style>
body { margin:0; font-family:Arial; }

/* USER BAR */
.user-bar {
  display:none;
  justify-content:center;
  align-items:center;
  background:#0a1f44;
  color:white;
  padding:6px;
  font-size:14px;
  flex-wrap:wrap;
  text-align:center;
}

.user-bar button {
  margin-left:10px;
  padding:5px 10px;
  border:none;
  background:#ff6600;
  color:white;
  border-radius:4px;
  cursor:pointer;
}

/* NAV */
nav {
  background:#0a1f44;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo {
  max-height:40px;
}

/* NAV RIGHT */
.nav-right {
  display:flex;
  align-items:center;
  flex-wrap:wrap;
}

nav a {
  color:white;
  margin:5px 10px;
  text-decoration:none;
  font-weight:bold;
}

/* LOGIN TAB */
.login-tab {
  background:#ff6600;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
  color:white;
  margin-left:10px;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
  padding:20px;
  background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
             url('./images/joe.jpg') center/cover;
}

.btn {
  padding:12px 20px;
  margin:10px;
  background:#ff6600;
  color:white;
  border:none;
  border-radius:5px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  padding:10px;
}

.modal-content {
  background:white;
  padding:25px;
  border-radius:10px;
  width:100%;
  max-width:350px;
  text-align:center;
}

.modal-content input {
  width:90%;
  padding:10px;
  margin:10px 0;
}

.modal-content button {
  margin:5px;
  padding:10px;
  width:90%;
  border:none;
  background:#0a1f44;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.google-btn {
  background:#db4437 !important;
}

.close {
  float:right;
  cursor:pointer;
}

/* MOBILE */
@media (max-width:600px){
  nav {
    flex-direction:column;
    align-items:flex-start;
  }

  .nav-right {
    width:100%;
    justify-content:space-between;
  }

  .hero h1 {
    font-size:28px;
  }
}
</style>
</head>

<body>

<!-- USER BAR -->
<div id="userBar" class="user-bar"></div>

<!-- NAV -->
<nav>
  <img src="./images/logo.png" class="logo">

  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>

    <div id="loginTab" class="login-tab" onclick="openModal()">
      Login / Sign Up
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Global Services Platform</h1>
  <p>Connecting Tourism & Conferences</p>

  <a href="conference.html"><button class="btn">Explore Conferences</button></a>
  <a href="tourism.html"><button class="btn">Explore Tourism</button></a>
</section>

<!-- MODAL -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <h3>Account Access</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Create Account</button>

    <button class="google-btn" onclick="googleLogin()">
      Continue with Google
    </button>

    <p id="status"></p>
  </div>
</div>

</body>
</html>
