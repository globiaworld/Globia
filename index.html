<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/png" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Platform</title>

<!-- GOOGLE AUTH PROVIDER SUPPORT -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhedQazeXeJzJgyaE44oAenGHXvILMqqc",
    authDomain: "globia-7038f.firebaseapp.com",
    projectId: "globia-7038f",
    storageBucket: "globia-7038f.appspot.com",
    messagingSenderId: "323603007481",
    appId: "1:323603007481:web:ed058146cae31922dd9f28"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  // OPEN MODAL
  window.openAuth = () => {
    document.getElementById("authModal").style.display = "flex";
  };

  // CLOSE MODAL
  window.closeAuth = () => {
    document.getElementById("authModal").style.display = "none";
  };

  // SIGN UP
  window.signup = () => {
    const email = emailInput.value;
    const password = passwordInput.value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => closeAuth())
      .catch(e => statusBar.innerText = e.message);
  };

  // LOGIN
  window.login = () => {
    const email = emailInput.value;
    const password = passwordInput.value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => closeAuth())
      .catch(e => statusBar.innerText = e.message);
  };

  // GOOGLE LOGIN
  window.googleLogin = () => {
    signInWithPopup(auth, provider)
      .then(() => closeAuth())
      .catch(e => statusBar.innerText = e.message);
  };

  // LOGOUT (CLEAR EVERYTHING)
  window.logout = () => {
    signOut(auth).then(() => {
      statusBar.innerText = "";
      document.getElementById("authTab").style.display = "flex";
      document.getElementById("userBar").style.display = "none";
    });
  };

  // AUTH STATE
  onAuthStateChanged(auth, (user) => {
    const authTab = document.getElementById("authTab");
    const userBar = document.getElementById("userBar");
    const userText = document.getElementById("userText");

    if (user) {
      authTab.style.display = "none";
      userBar.style.display = "flex";
      userText.innerText = "Logged in: " + user.email;
    } else {
      authTab.style.display = "flex";
      userBar.style.display = "none";
      userText.innerText = "";
    }
  });

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const statusBar = document.getElementById("statusBar");
</script>

<style>
body {
  margin:0;
  font-family:Arial;
}

/* TOP BAR */
.topbar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  background:#0a1f44;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  z-index:1000;
}

/* LOGO */
.logo {
  height:40px;
}

/* AUTH TAB */
.auth-tab {
  background:#ff6600;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

/* USER BAR */
.user-bar {
  display:none;
  background:#1f8f3a;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  align-items:center;
  gap:10px;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding-top:60px;

  background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
  url('images/joe.jpg') center/cover;
}

.btn {
  padding:12px 20px;
  margin:8px;
  background:#ff6600;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:350px;
  text-align:center;
}

.modal-content input {
  width:90%;
  padding:10px;
  margin:8px 0;
}

.google-btn {
  background:#db4437;
  margin-top:10px;
}
</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <img src="images/logo.png" class="logo">

  <div id="authTab" class="auth-tab" onclick="openAuth()">
    Login / Create Account
  </div>

  <div id="userBar" class="user-bar">
    <span id="userText"></span>
    <button onclick="logout()" style="border:none;padding:6px 10px;border-radius:10px;cursor:pointer;">
      Logout
    </button>
  </div>

</div>

<!-- HERO -->
<section class="hero">
  <h1>Global Services Platform</h1>
  <p>Connecting Tourism & Conferences</p>

  <a href="conference.html"><button class="btn">Explore Conferences</button></a>
  <a href="tourism.html"><button class="btn">Explore Tourism</button></a>
</section>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">
  <div class="modal-content">

    <h3>Account Access</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button onclick="login()">Login</button>

    <button class="google-btn" onclick="googleLogin()">
      🔵 Continue with Google
    </button>

    <br><br>
    <button onclick="closeAuth()">Close</button>

  </div>
</div>

</body>
</html>
