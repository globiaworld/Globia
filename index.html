<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobiaWorld Platform</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhedQazeXeZJzJgyaE44oAenGHXvILMqqc",
  authDomain: "globia-7038f.firebaseapp.com",
  projectId: "globia-7038f",
  storageBucket: "globia-7038f.appspot.com",
  messagingSenderId: "323603007481",
  appId: "1:323603007481:web:ed058146cae31922dd9f28"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* OPEN MODAL */
window.openAuth = () => {
  document.getElementById("authModal").style.display = "flex";
};

/* CLOSE + RESET INPUTS */
window.closeAuth = () => {
  document.getElementById("authModal").style.display = "none";
  document.getElementById("email").value = "";
  document.getElementById("password").value = "";
};

/* SIGN UP */
window.signup = () => {
  createUserWithEmailAndPassword(
    auth,
    email.value,
    password.value
  ).then(closeAuth)
   .catch(e => alert(e.message));
};

/* LOGIN */
window.login = () => {
  signInWithEmailAndPassword(
    auth,
    email.value,
    password.value
  ).then(closeAuth)
   .catch(e => alert(e.message));
};

/* GOOGLE LOGIN */
window.googleLogin = () => {
  signInWithPopup(auth, provider)
    .then(closeAuth)
    .catch(e => alert(e.message));
};

/* LOGOUT */
window.logout = () => {
  signOut(auth).then(() => {
    email.value = "";
    password.value = "";

    document.getElementById("authTab").style.display = "flex";
    document.getElementById("userBar").style.display = "none";
    document.getElementById("userText").innerText = "";

    document.getElementById("topbar").classList.remove("logged");
  });
};

/* AUTH STATE */
onAuthStateChanged(auth, user => {
  const authTab = document.getElementById("authTab");
  const userBar = document.getElementById("userBar");
  const userText = document.getElementById("userText");
  const topbar = document.getElementById("topbar");

  if (user) {
    authTab.style.display = "none";
    userBar.style.display = "flex";
    userText.innerText = user.email;

    topbar.classList.add("logged");
  } else {
    authTab.style.display = "flex";
    userBar.style.display = "none";
    topbar.classList.remove("logged");
  }
});

</script>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f6fb;
  color:#111;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:#ff6600;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  transition:0.4s;
  z-index:1000;
}

/* GREEN WHEN LOGGED IN */
.topbar.logged{
  background:#1f8f3a !important;
}

.logo{height:40px}

/* AUTH BUTTON */
.auth-tab{
  background:white;
  color:#ff6600;
  padding:8px 14px;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

/* USER BAR */
.user-bar{
  display:none;
  gap:10px;
  align-items:center;
  color:white;
}

.logout-btn{
  background:#111;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:10px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:
  linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
  url('images/joe.jpg') center/cover;
  color:white;
}

.btn{
  padding:12px 20px;
  background:#ff6600;
  border:none;
  color:white;
  border-radius:8px;
  margin:6px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.modal-content input{
  width:100%;
  padding:10px;
  margin:6px 0;
}

/* GOOGLE BUTTON */
.google-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#4285F4;
  color:white;
  cursor:pointer;
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar" id="topbar">

  <img src="images/logo.png" class="logo">

  <div id="authTab" class="auth-tab" onclick="openAuth()">
    Login / Register
  </div>

  <div id="userBar" class="user-bar">
    <span id="userText"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

</div>

<!-- HERO -->
<div class="hero">
  <h1>GlobiaWorld Ecosystem</h1>
  <p>Legal • Dating • Tourism • Conferences</p>

  <a href="justice.html"><button class="btn">⚖️ Legal</button></a>
  <a href="dating.html"><button class="btn">💘 Dating</button></a>
  <a href="conference.html"><button class="btn">🎤 Conferences</button></a>
  <a href="tourism.html"><button class="btn">✈️ Tourism</button></a>
</div>

<!-- AUTH MODAL -->
<div class="modal" id="authModal">
  <div class="modal-content">

    <h3>Login</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button onclick="login()">Login</button>

    <!-- GOOGLE LOGIN (OFFICIAL STYLE ICON) -->
    <button class="google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.72 1.22 9.21 3.6l6.85-6.85C35.9 2.34 30.29 0 24 0 14.62 0 6.51 5.38 2.69 13.22l7.98 6.2C12.43 13.13 17.73 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.09h12.94c-.58 3.02-2.26 5.6-4.84 7.33l7.4 5.75C43.9 37.12 46.98 31.43 46.98 24.55z"/>
        <path fill="#FBBC05" d="M10.67 28.42c-.48-1.43-.76-2.96-.76-4.42s.28-2.99.76-4.42l-7.98-6.2C.92 16.46 0 20.12 0 24s.92 7.54 2.69 10.62l7.98-6.2z"/>
        <path fill="#34A853" d="M24 48c6.29 0 11.6-2.07 15.47-5.62l-7.4-5.75c-2.06 1.38-4.7 2.22-8.07 2.22-6.27 0-11.57-3.63-13.33-8.92l-7.98 6.2C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <br>
    <button onclick="closeAuth()">Close</button>

  </div>
</div>

</body>
</html>
