<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism</title>

<style>
body { 
  margin:0; 
  font-family:'Segoe UI', sans-serif; 
  background:#f4f7fb; 
}

/* NAV */
nav {
  background:#0a1f44;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { height:60px; }

nav a { color:white; margin:0 12px; text-decoration:none; }

/* HERO */
.hero {
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
  url("/images/hero.jpg") center/cover no-repeat;
}

.section { padding:50px 40px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARD */
.card {
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  position:relative;
}

/* SLOT */
.slots {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

/* IMAGE */
.card img { width:100%; height:200px; object-fit:cover; }

/* CONTENT */
.card-content { padding:25px; }

.stars { color:#ffaa00; }

/* ⭐ REVIEW BOXES */
.review-box {
  background:#f9fbff;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-size:13px;
  font-style:italic;
  color:#444;
  min-height:40px;
}

/* BUTTON */
.btn {
  padding:12px 22px;
  background:#ff6600;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

/* SCROLL REVIEWS */
.review-scroll {
  overflow:hidden;
  background:#fff;
  padding:12px 0;
}

.review-track {
  display:flex;
  gap:40px;
  white-space:nowrap;
  animation:move 25s linear infinite;
}

@keyframes move {
  from { transform:translateX(100%); }
  to { transform:translateX(-100%); }
}
</style>
</head>

<body>

<nav>
  <img src="images/logo.png" class="logo">
  <div>
    <a href="#">Home</a>
    <a href="#">Tours</a>
  </div>
</nav>

<div class="hero">
  <h1>Explore Tourism</h1>
</div>

<section class="section">
<h2>Destinations</h2>

<div class="grid">

<!-- ================= MAASAI MARA ================= -->
<div class="card">
<div class="slots" id="slots1">🔥 6 slots left</div>
<img src="/images/maasai.jpg">

<div class="card-content">
<h3>Maasai Mara</h3>
<div class="stars">★★★★★</div>

<p>Big Five safari experience.</p>

<div class="review-box" id="leftReview"></div>

<button class="btn" onclick="payTour(5000)">Book - KES 5000</button>
</div>
</div>

<!-- ================= DUBAI ================= -->
<div class="card">
<div class="slots" id="slots2">🔥 8 slots left</div>
<img src="/images/dubai.jpg">

<div class="card-content">
<h3>Dubai</h3>
<div class="stars">★★★★☆</div>

<p>Luxury desert & city experience.</p>

<div class="review-box" id="rightReview"></div>

<button class="btn" onclick="payTour(10000)">Book - KES 10000</button>
</div>
</div>

</div>
</section>

<!-- SCROLL REVIEWS -->
<div class="review-scroll">
  <div class="review-track" id="track"></div>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
// PAYSTACK
function payTour(amount){
  let handler = PaystackPop.setup({
    key: "pk_test_f1a02bf2a0d437eeaff6995e005dd6dc74473780",
    email: "customer@email.com",
    amount: amount * 100,
    currency: "KES",
    callback: ()=> alert("Payment successful!")
  });
  handler.openIframe();
}

/* ================= LEFT REVIEWS (MAASAI MARA - DIFFERENT USERS) ================= */
const leftReviews = [
"Peter (UK): Best safari ever!",
"Susan (USA): Unreal experience!",
"David (Canada): Saw all Big Five!",
"Grace (Kenya): Magical journey!",
"Ahmed (UAE): Worth every dollar!",
"Linda (Germany): Stunning views!",
"Paul (Australia): Incredible guides!"
];

/* ================= RIGHT REVIEWS (DUBAI - COMPLETELY DIFFERENT USERS) ================= */
const rightReviews = [
"Ali (Dubai): Luxury at its peak!",
"Sophia (Italy): Amazing city tour!",
"John (USA): Burj Khalifa view wow!",
"Fatima (Qatar): Perfect holiday!",
"Lucas (France): Super clean city!",
"Emma (UK): Desert safari amazing!",
"Zain (India): Best experience ever!"
];

/* ROTATE SEPARATELY */
setInterval(()=>{
  document.getElementById("leftReview").innerText =
  leftReviews[Math.floor(Math.random()*leftReviews.length)];
},5000);

setInterval(()=>{
  document.getElementById("rightReview").innerText =
  rightReviews[Math.floor(Math.random()*rightReviews.length)];
},6000);

/* ================= SCROLL REVIEWS ================= */
const all = [...leftReviews, ...rightReviews];
const track = document.getElementById("track");

all.forEach(r=>{
  let span = document.createElement("span");
  span.innerText = r;
  track.appendChild(span);
});

/* ================= SLOT DECREASE ================= */
function reduce(id){
  let el = document.getElementById(id);
  let num = parseInt(el.innerText.match(/\d+/));
  if(num > 1){
    el.innerText = "🔥 " + (num-1) + " slots left";
  }
}
setInterval(()=>reduce("slots1"),14000);
setInterval(()=>reduce("slots2"),17000);
</script>

</body>
</html>
