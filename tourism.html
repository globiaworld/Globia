<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="images/logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism</title>        

<style>
body { 
  margin:0; 
  font-family:'Segoe UI', sans-serif; 
  background:#f4f7fb; 
}

/* NAV */
nav {
  background:#0a1f44;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo { height:60px; }

nav a {
  color:white;
  margin:0 12px;
  text-decoration:none;
}

/* HERO */
.hero {
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
             url("/images/hero.jpg") center/cover no-repeat;
}

/* SECTION */
.section { padding:50px 40px; text-align:center; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}

/* CARD */
.card {
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
  transition:0.4s;
  position:relative;
  opacity:0;
  transform:translateY(40px);
}

/* ✨ SCROLL SHOW */
.card.show {
  opacity:1;
  transform:translateY(0);
}

/* ✨ GLOW EFFECT */
.card:hover,
.card:active,
.card.show {
  box-shadow:0 0 25px rgba(255,102,0,0.5);
  transform:translateY(-8px) scale(1.02);
}

/* IMAGE */
.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* BADGE */
.badge {
  position:absolute;
  top:15px;
  left:15px;
  background:#ff3b3b;
  color:white;
  padding:6px 12px;
  font-size:12px;
  border-radius:20px;
}

/* CONTENT */
.card-content { padding:25px; }

/* RATING */
.rating {
  color:#ffaa00;
  margin:5px 0;
}

/* BUTTON */
.btn {
  padding:12px 22px;
  background:#ff6600;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

/* 🌍 LIVE POPUP */
.popup {
  position:fixed;
  bottom:20px;
  left:20px;
  background:white;
  padding:12px 18px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  font-size:14px;
  display:none;
  z-index:999;
}
</style>
</head>

<body>

<nav>
  <img src="images/logo.png" class="logo">
  <div>
    <a href="index.html">Home</a>
    <a href="conference.html">Conferences</a>
    <a href="tourism.html">Tourism</a>
  </div>
</nav>

<div class="hero">
  <h1>Explore Tourism</h1>
</div>

<section class="section">
<h2>Destinations</h2>

<div class="grid">

<div class="card">
<div class="badge" id="slots1">🔥 Only 5 slots left</div>
<img src="/images/maasai.jpg">
<div class="card-content">
<h3>Maasai Mara</h3>
<div class="rating">★★★★★ (124 reviews)</div>
<p>Experience one of Africa’s most iconic reserves.</p>
<button class="btn" onclick="payTour(5000)">Book - KES 5000</button>
</div>
</div>

<div class="card">
<div class="badge" id="slots2">🔥 Only 7 slots left</div>
<img src="/images/dubai.jpg">
<div class="card-content">
<h3>Dubai</h3>
<div class="rating">★★★★☆ (89 reviews)</div>
<p>Luxury and adventure combined.</p>
<button class="btn" onclick="payTour(10000)">Book - KES 10000</button>
</div>
</div>

</div>
</section>

<!-- 🌍 LIVE BOOKINGS -->
<div class="popup" id="popup"></div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
// PAYSTACK
function payTour(amount){
  let handler = PaystackPop.setup({
    key: "pk_test_f1a02bf2a0d437eeaff6995e005dd6dc74473780",
    email: "customer@email.com",
    amount: amount * 100,
    currency: "KES",
    callback: function(response){
      alert("✅ Payment successful!");
    }
  });
  handler.openIframe();
}

// 🔥 AUTO SLOT REDUCTION
function reduceSlots(id){
  let el = document.getElementById(id);
  let num = parseInt(el.innerText.match(/\d+/));
  if(num > 1){
    num--;
    el.innerText = "🔥 Only " + num + " slots left";
  }
}
setInterval(()=>reduceSlots("slots1"),10000);
setInterval(()=>reduceSlots("slots2"),12000);

// 🌍 LIVE BOOKINGS POPUP
const names = ["John (UK)","Mary (USA)","Ali (UAE)","James (Canada)","Lina (Germany)"];

function showPopup(){
  let popup = document.getElementById("popup");
  let name = names[Math.floor(Math.random()*names.length)];
  popup.innerText = name + " just booked a trip!";
  popup.style.display="block";

  setTimeout(()=>popup.style.display="none",4000);
}
setInterval(showPopup,8000);

// ✨ SCROLL ANIMATION
const cards = document.querySelectorAll(".card");

function reveal(){
  cards.forEach(card=>{
    let top = card.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      card.classList.add("show");
    }
  });
}
window.addEventListener("scroll", reveal);
window.addEventListener("load", reveal);
</script>

</body>
</html>
