<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tourism</title>        

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

nav { background:#0a1f44; padding:15px; text-align:center; }
nav a { color:white; margin:0 10px; text-decoration:none; }

/* HERO BANNER UPDATED */
.hero {
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;

  /* 👇 ADD YOUR IMAGE HERE */
  background: url("/images/hero.jpg") center/cover no-repeat;

  /* Optional dark overlay for better text visibility */
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.1);
}

.hero h1 {
  position:relative;
  z-index:1;
}

.section { padding:40px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card {
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content { padding:15px; }

.btn {
  display:inline-block;
  padding:10px 20px;
  background:#ff6600;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="conference.html">Conferences</a>
<a href="tourism.html">Tourism</a>
</nav>

<div class="hero">
<h1>Explore Tourism</h1>
</div>

<section class="section">
<h2>Destinations</h2>

<div class="grid">

<div class="card">
<img src="/images/maasai.jpg">
<div class="card-content">
<h3>Maasai Mara</h3>
<button class="btn" onclick="payTour(5000)">Book - KES 5000</button>
</div>
</div>

<div class="card">
<img src="/images/dubai.jpg">
<div class="card-content">
<h3>Dubai</h3>
<button class="btn" onclick="payTour(10000)">Book - KES 10000</button>
</div>
</div>

</div>
</section>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
function payTour(amount){
  let handler = PaystackPop.setup({
    key: "pk_test_f1a02bf2a0d437eeaff6995e005dd6dc74473780",
    email: "customer@email.com",
    amount: amount * 100,
    currency: "KES",
    callback: function(response){
      alert("Payment successful!");
    }
  });

  handler.openIframe();
}
</script>

</body>
</html>
