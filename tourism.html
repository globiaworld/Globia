<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Tourism</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

nav { background:#0a1f44; padding:15px; text-align:center; }
nav a { color:white; margin:0 15px; text-decoration:none; }

.hero {
  height:60vh;
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
  url('images/tourism-hero.jpg') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
}

.section { padding:40px; text-align:center; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
}

.chatbox {
  position:fixed;
  bottom:20px;
  right:20px;
  width:280px;
  background:white;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.chat-header { background:#0a1f44; color:white; padding:10px; }
.chat-body { height:180px; overflow:auto; padding:10px; }
.chat-input { display:flex; }
.chat-input input { flex:1; padding:10px; }
.chat-input button { background:#ff6600; color:white; border:none; }

.btn {
  background:#ff6600;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="conference.html">Conferences</a>
<a href="tourism.html">Tourism</a>
</nav>

<div class="hero">
<h1>Explore Tourism</h1>
</div>

<section class="section">
<h2>Tours</h2>
<div class="grid" id="tourContainer"></div>
</section>

<section class="section" id="booking" style="display:none;">
<h2>Book Tour</h2>

<select id="tourSelect"></select><br><br>

<select id="ticket">
<option value="0">Regular</option>
<option value="150">VIP ($150)</option>
<option value="300">Premium ($300)</option>
</select><br><br>

<button class="btn" onclick="pay()">Pay & Book</button>
</section>

<!-- CHAT -->
<div class="chatbox">
<div class="chat-header">AI Assistant</div>
<div class="chat-body" id="chat"></div>
<div class="chat-input">
<input id="input">
<button onclick="chatAI()">Send</button>
</div>
</div>

<script src="https://js.stripe.com/v3/"></script>
<script src="js/ai.js"></script>

<script>
let logged=false;

/* LOGIN SIMPLE */
function login(){
 logged=true;
 document.getElementById("booking").style.display="block";
}

/* LOAD TOURS (FIXED — NO LOCALHOST) */
async function loadTours(){
 const res = await fetch("/events"); // ✅ FIXED
 const tours = await res.json();

 let container = document.getElementById("tourContainer");
 let select = document.getElementById("tourSelect");

 container.innerHTML="";
 select.innerHTML="";

 tours.forEach((t,i)=>{
  container.innerHTML += `
   <div class="card">
    <h3>${t.name}</h3>
    <p>${t.location}</p>
    <p>${t.description || "Amazing experience"}</p>
   </div>`;

  select.innerHTML += `<option value="${i}">${t.name}</option>`;
 });
}
loadTours();

/* STRIPE */
const stripe = Stripe("YOUR_PUBLIC_KEY");

async function pay(){
 if(!logged){ alert("Login first"); return; }

 const price = document.getElementById("ticket").value;

 const res = await fetch("/create-checkout-session",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({price})
 });

 const data = await res.json();
 stripe.redirectToCheckout({sessionId:data.id});
}

/* AI CHAT */
async function chatAI(){
 let msg = document.getElementById("input").value;
 let chat = document.getElementById("chat");

 if(!msg) return;

 chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;

 const reply = await askAI(msg);

 chat.innerHTML += `<p><b>AI:</b> ${reply}</p>`;

 document.getElementById("input").value="";
 chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
